[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "libXcomposite",
  "libXdamage",
  "libXfixes",
  "libXrandr",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "expat",
  "dbus",
  "at-spi2-atk",
  "at-spi2-core",
  "glib",
  "gtk3",
  "xorg.libX11",
  "xorg.libXcursor",
  "xorg.libXext"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
SKIP_AI = "true"
PLAYWRIGHT_BROWSERS_PATH = "/usr/bin"
